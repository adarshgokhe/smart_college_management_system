{% extends 'base.html' %}
{% set title='Course Management' %}
{% block content %}
<div class="card">
  <h3>Add Course</h3>
  <form method="post" class="grid">
    <input name="name" placeholder="Course Name" required>
    <input name="duration" placeholder="Duration">
    <input name="fee_amount" type="number" min="0" step="100" placeholder="College Fee" required>
    <input name="description" placeholder="Description">
    <button class="btn">Add Course</button>
  </form>
</div>

<div class="card">
  <h3>Courses</h3>
  <div class="table-wrap">
    <table>
      <tr><th>Name</th><th>Duration</th><th>College Fee</th><th>Description</th><th>Action</th></tr>
      {% for c in courses %}
      <tr><td>{{c.name}}</td><td>{{c.duration}}</td><td>Rs. {{'%.0f'|format(c.fee_amount or 0)}}</td><td>{{c.description}}</td><td><a class="btn secondary" href="{{ url_for('edit_course', course_id_value=c.id) }}">Edit</a></td></tr>
      {% endfor %}
    </table>
  </div>
</div>
{% endblock %}
